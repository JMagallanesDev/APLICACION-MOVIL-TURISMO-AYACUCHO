spring:
  application:
    name: tourism

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/huamanga}
    username: ${DATABASE_USER:huamanga}
    password: ${DATABASE_PASSWORD:huamanga_dev}

  jpa:
    hibernate:
      ddl-auto: validate # el esquema lo gobierna Flyway, nunca Hibernate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}

server:
  port: ${PORT:8080}
  servlet:
    context-path: /api/v1

# Seguridad de sesión (plan v8.0, sección 5.3)
# Access token corto (60 min por defecto; corrección técnica #3 del plan
# comprimido) + refresh token 7 días en cookie httpOnly con rotación.
jwt:
  secret: ${JWT_SECRET:secreto-solo-para-desarrollo-local-cambiar-en-produccion!}
  expiration-ms: ${JWT_EXPIRATION:3600000}
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION:604800000}

seguridad:
  cookie-secure: ${COOKIE_SECURE:false}
  cors-allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  rate-limit-por-minuto: ${RATE_LIMIT_POR_MINUTO:100}

# Clima (RF-25): OpenWeatherMap sobre la Plaza Mayor de Huamanga,
# caché Redis 30 min + fallback al último dato conocido si el proveedor cae
clima:
  api-key: ${OPENWEATHER_API_KEY:}
  latitud: -13.16307
  longitud: -74.22357
  cache-minutos: 30

resilience4j:
  circuitbreaker:
    instances:
      clima:
        slidingWindowSize: 6
        minimumNumberOfCalls: 3
        failureRateThreshold: 50
        waitDurationInOpenState: 60s

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
