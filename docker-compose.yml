services:
  db:
    image: postgis/postgis:16-3.4
    container_name: huamanga-db
    environment:
      POSTGRES_DB: huamanga
      POSTGRES_USER: huamanga
      POSTGRES_PASSWORD: huamanga_dev
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U huamanga -d huamanga"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: huamanga-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  db_data:
  redis_data:
